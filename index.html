<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编程学习智能助教系统</title>
    <!-- 引入Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 引入Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 引入自定义CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 头部 -->
    <header class="bg-primary text-white text-center py-5">
        <div class="container">
            <h1><i class="fas fa-code"></i> 编程学习智能助教系统</h1>
            <p class="lead">面向Python初学者和大学生代码错误诊断与学习引导平台</p>
        </div>
    </header>

    <!-- 主体内容 -->
    <main class="container my-5">
        <div class="row">
            <!-- 代码输入区域 -->
            <div class="col-md-6 mb-4">
                <div class="card code-input-card">
                    <div class="card-header bg-secondary text-white">
                        <h2 class="h5 mb-0">代码输入</h2>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="code-input" class="form-label">请输入Python代码：</label>
                            <div class="code-editor">
                                <div id="line-numbers" class="line-numbers"></div>
                                <textarea id="code-input" class="form-control code-area" rows="10" placeholder="例如：

def calculate_average(numbers):
    total = sum(numbers)
    average = total / len(numbers)
    return average

# 测试
numbers = [1, 2, 3, 4, 5]
print(calculate_average(numbers))"></textarea>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="error-message" class="form-label">错误信息（如果有）：</label>
                            <textarea id="error-message" class="form-control" rows="3" placeholder="如果运行时出现错误，请在此粘贴错误信息"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="file-upload" class="form-label">上传文件（可选）：</label>
                            <div class="input-group">
                                <input type="file" id="file-upload" class="form-control" accept=".txt,.doc,.docx,.py">
                                <button type="button" id="cancel-upload" class="btn btn-outline-secondary">取消</button>
                            </div>
                            <small class="form-text text-muted">支持上传 .txt, .doc, .docx, .py 文件</small>
                        </div>
                        <button id="analyze-btn" class="btn btn-primary w-100">
                            <i class="fas fa-search"></i> 分析代码
                        </button>
                    </div>
                </div>
            </div>

            <!-- 结果展示区域 -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h2 class="h5 mb-0">分析结果</h2>
                    </div>
                    <div class="card-body">
                        <div id="result-container" class="mt-3">
                            <div class="alert alert-info" role="alert">
                                <i class="fas fa-info-circle"></i> 请输入代码并点击"分析代码"按钮
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 尾部 -->
    <footer class="bg-dark text-white text-center py-4 mt-5">
        <div class="container">
            <p>&copy; 2026 编程学习智能助教系统 - 毕业设计</p>
        </div>
    </footer>

    <!-- 引入Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 引入自定义JS -->
    <script src="script.js"></script>
</body>
</html>
